# hydrology for the CLOD-POC viewer.
# Water is a visual layer only: no SSR, no caustics, no physics.
# Water is a separate render layer and is NEVER fed into the CLOD page source
# mesh, meshoptimizer, page borders, LOD selection, colliders, or validation.
water:
  enabled: true
  source: hydrology # hydrology | fake_bodies
  cells_per_level: 128
  cell_sizes: [1.5, 3.0, 6.0, 12.0, 24.0, 48.0]
  snap_cells: 2
  dry_sentinel_depth: 2.0

  hydrology:
    enabled: true
    sim_res: 256
    dry_sentinel_depth: 2.0
    fill:
      enabled: true
      iterations: 900
      epsilon_per_cell: 0.0045
      lake_delta: 2.2
      marsh_delta: 0.15
    accumulation:
      particles: 350000
      max_steps: 220
      flat_gradient_stop: 0.012
      inertia: 0.45
      jitter_seed: 12345
    rivers:
      river_threshold_add: 14
      visible_water_threshold_add: 320
      widen_radius: 2
      carve_depth_m: 7.5
      carve_power: 1.35
      visible_depth_m: 3.3
      visible_depth_power: 2.2
      slope_gate_start: 0.50
      slope_gate_end: 0.24
      min_visible_depth: 0.05
      guarantee_fallback_rivers: true
      fallback_main_river: true
      fallback_tributaries: true
      flow_speed_multiplier: 1.15
      lake_surface_drop_m: 2.0
    water_surface:
      far_reduce_factor: 8
      far_level_min_cell_size: 12.0
      dry_sentinel_depth: 2.0
      wet_smooth_iterations: 2
      wet_to_wet_cliff_slope_max: 0.35
      far_lake_dominance: 0.4
      far_river_dominance: 0.3
      far_wet_threshold: 0.1
    moisture:
      enabled: true
      blur_radius: 4
      lake_source: 1.0
      river_source: 0.85
      marsh_source: 0.65
      dry_decay: 0.82
    talus:
      enabled: true
      iterations: 8
      strength: 0.12
    debug:
      show_fill: false
      show_accumulation: false
      show_carved_bed: false
      show_water_y: false
      dump_fields: false
      dump_dir: qa-runs/hydrology-fields

  fake_bodies:
    carve_terrain: true
    lakes:
      - center_norm: [0.50, 0.50]
        radius: [42, 30]
        level_offset: 1.2
      - center_norm: [0.25, 0.72]
        radius: [32, 24]
        level_offset: 1.0
    rivers:
      - points_norm: [[0.16, 0.34], [0.30, 0.42], [0.48, 0.48], [0.66, 0.57], [0.84, 0.66]]
        width: 9.0
        level_offset: 0.8
        downstream_drop: 3.0

  visual:
    shallow_color: [0.00, 0.32, 0.55]
    deep_color: [0.00, 0.025, 0.12]
    foam_color: [0.90, 0.95, 0.96]
    alpha: 0.90
    ripple_cycle: 0.07
    ripple_amp: 1.38
    ripple_speed: 0.58
    ripple_scale_a: 0.16
    ripple_scale_b: 0.105
    ripple_strength_a: 0.26
    ripple_strength_b: 0.18
    ripple_loop_distance: 22.0
    lake_breeze: [0.20, 0.07]
    shore_foam_start: 0.03
    shore_foam_end: 0.18
    foam:
      noise_scale: 0.075
      shore_strength: 0.58
      river_strength: 0.72
      speed_start: 0.18
      speed_end: 0.82
      drop_start: 0.22
      drop_end: 1.45
    fresnel:
      base: 0.045
      power: 4.2
      normal_flatten: 0.48
    color:
      depth_scale: 4.6
      turbidity: 0.12
    refraction:
      enabled: true
      strength: 0.055
      depth_validation_bias: 0.02
      absorption_r: 0.42
      absorption_g: 0.135
      absorption_b: 0.095
      turbidity_strength: 0.032
      max_thickness: 8.0
    reflection:
      mode: fake
      ssr_enabled: false
      max_steps: 18
      step_scale: 0.09
      edge_fade_start: 1.0
      edge_fade_end: 0.82
      sky_fallback_strength: 0.78
      terrain_fallback_strength: 0.12
    depth_write: false

  debug:
    mode: 0
    clipmap_tint: false
    wireframe: false

  caustics:
    enabled: false
    gain: 1.3
    depth_fade: 0.32
    focal_depth: 0.5
    sun_gate_start: 0.03
    sun_gate_end: 0.16
    flow_advection: 1.9
    scale: 0.12
    speed: 0.7
