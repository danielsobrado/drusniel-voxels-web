# Fable5-style fake water clipmap for the CLOD-POC viewer.
# This is a visual POC only: no hydrology, no SSR, no caustics, no physics.
# Water is a separate render layer and is NEVER fed into the CLOD page source
# mesh, meshoptimizer, page borders, LOD selection, colliders, or validation.
water:
  enabled: true
  cells_per_level: 128
  cell_sizes: [1.5, 3.0, 6.0, 12.0, 24.0]
  snap_cells: 2
  dry_sentinel_depth: 2.0

  fake_bodies:
    lakes:
      - center_norm: [0.52, 0.46]
        radius: [85, 55]
        level_offset: 5.0
      - center_norm: [0.20, 0.80]
        radius: [60, 45]
        level_offset: 4.5
    rivers:
      - points_norm: [[0.18, 0.38], [0.33, 0.45], [0.50, 0.48], [0.68, 0.55], [0.82, 0.62]]
        width: 18.0
        level_offset: 4.8
        downstream_drop: 1.5

  visual:
    shallow_color: [0.16, 0.38, 0.36]
    deep_color: [0.02, 0.08, 0.12]
    foam_color: [0.82, 0.88, 0.84]
    alpha: 0.82
    ripple_cycle: 0.065
    ripple_amp: 1.0
    ripple_speed: 0.45
    ripple_scale_a: 0.18
    ripple_scale_b: 0.115
    ripple_strength_a: 0.20
    ripple_strength_b: 0.13
    ripple_loop_distance: 18.0
    lake_breeze: [0.18, 0.06]
    shore_foam_start: 0.03
    shore_foam_end: 0.16
    foam:
      noise_scale: 0.09
      shore_strength: 0.58
      river_strength: 0.42
      speed_start: 0.25
      speed_end: 1.0
      drop_start: 0.5
      drop_end: 2.0
    fresnel:
      base: 0.08
      power: 4.5
      normal_flatten: 0.72
    color:
      depth_scale: 4.0
      turbidity: 0.18
    depth_write: false

  debug:
    mode: 0
    clipmap_tint: false
    wireframe: false
