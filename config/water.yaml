# Fable5-style terrain-derived hydrology for the CLOD-POC viewer.
# Water is a visual layer only: no SSR, no caustics, no physics.
# Water is a separate render layer and is NEVER fed into the CLOD page source
# mesh, meshoptimizer, page borders, LOD selection, colliders, or validation.
water:
  enabled: true
  source: hydrology # hydrology | fake_bodies
  cells_per_level: 128
  cell_sizes: [1.5, 3.0, 6.0, 12.0, 24.0]
  snap_cells: 2
  dry_sentinel_depth: 2.0

  hydrology:
    enabled: true
    sim_res: 256
    dry_sentinel_depth: 2.0
    fill:
      enabled: true
      iterations: 900
      epsilon_per_cell: 0.0045
      lake_delta: 2.2
      marsh_delta: 0.15
    accumulation:
      particles: 350000
      max_steps: 220
      flat_gradient_stop: 0.012
      inertia: 0.45
      jitter_seed: 12345
    rivers:
      river_threshold_add: 14
      visible_water_threshold_add: 320
      widen_radius: 2
      carve_depth_m: 7.5
      carve_power: 1.35
      visible_depth_m: 3.3
      visible_depth_power: 2.2
      slope_gate_start: 0.50
      slope_gate_end: 0.24
      min_visible_depth: 0.05
    water_surface:
      far_reduce_factor: 8
      far_level_min_cell_size: 12.0
      dry_sentinel_depth: 2.0
      wet_smooth_iterations: 2
      wet_to_wet_cliff_slope_max: 0.35
    moisture:
      enabled: true
      blur_radius: 4
      lake_source: 1.0
      river_source: 0.85
      marsh_source: 0.65
      dry_decay: 0.82
    talus:
      enabled: true
      iterations: 8
      strength: 0.12
    debug:
      show_fill: false
      show_accumulation: false
      show_carved_bed: false
      show_water_y: false
      dump_fields: false
      dump_dir: qa-runs/hydrology-fields

  fake_bodies:
    carve_terrain: true
    lakes:
      - center_norm: [0.50, 0.50]
        radius: [42, 30]
        level_offset: 1.2
      - center_norm: [0.25, 0.72]
        radius: [32, 24]
        level_offset: 1.0
    rivers:
      - points_norm: [[0.16, 0.34], [0.30, 0.42], [0.48, 0.48], [0.66, 0.57], [0.84, 0.66]]
        width: 9.0
        level_offset: 0.8
        downstream_drop: 3.0

  visual:
    shallow_color: [0.16, 0.38, 0.36]
    deep_color: [0.02, 0.08, 0.12]
    foam_color: [0.82, 0.88, 0.84]
    alpha: 0.82
    ripple_cycle: 0.065
    ripple_amp: 1.0
    ripple_speed: 0.45
    ripple_scale_a: 0.18
    ripple_scale_b: 0.115
    ripple_strength_a: 0.20
    ripple_strength_b: 0.13
    ripple_loop_distance: 18.0
    lake_breeze: [0.18, 0.06]
    shore_foam_start: 0.03
    shore_foam_end: 0.16
    foam:
      noise_scale: 0.09
      shore_strength: 0.58
      river_strength: 0.42
      speed_start: 0.25
      speed_end: 1.0
      drop_start: 0.5
      drop_end: 2.0
    fresnel:
      base: 0.08
      power: 4.5
      normal_flatten: 0.72
    color:
      depth_scale: 4.0
      turbidity: 0.18
    depth_write: false

  debug:
    mode: 0
    clipmap_tint: false
    wireframe: false
