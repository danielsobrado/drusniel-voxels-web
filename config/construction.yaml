construction:
  enabled: true
  snap:
    radius_m: 0.85
    spatial_cell_m: 1.0
    min_alignment: 0.70
    alignment_weight: 0.65
    distance_weight: 0.35
  placement:
    max_ray_distance_m: 8000
    terrain_step_m: 2
    overlap_padding_m: 0.04
    storage_key: drusniel.clod-poc.construction.v1
  ghost:
    opacity: 0.42
  terrain_conform:
    enabled: false
    foundation_categories: [floor]
    pad_margin_m: 0.35
    fill_depth_m: 2.5
    trim_height_m: 1.2
    falloff_m: 0.12
    material_slot: 1
  pieces:
    - id: wood-floor-2x2
      label: Wood Floor
      category: floor
      dimensions_m: [2.0, 0.2, 2.0]
      can_ground: true
      material: wood
      snap_points:
        - id: edge-north
          local_pos: [0.0, 0.1, -1.0]
          direction: [0.0, 0.0, -1.0]
          group: floor-edge
          accepts: [floor-edge, wall-bottom]
        - id: edge-south
          local_pos: [0.0, 0.1, 1.0]
          direction: [0.0, 0.0, 1.0]
          group: floor-edge
          accepts: [floor-edge, wall-bottom]
        - id: edge-west
          local_pos: [-1.0, 0.1, 0.0]
          direction: [-1.0, 0.0, 0.0]
          group: floor-edge
          accepts: [floor-edge, wall-bottom]
        - id: edge-east
          local_pos: [1.0, 0.1, 0.0]
          direction: [1.0, 0.0, 0.0]
          group: floor-edge
          accepts: [floor-edge, wall-bottom]

    - id: wood-wall-2x2
      label: Wood Wall
      category: wall
      dimensions_m: [2.0, 2.0, 0.2]
      can_ground: false
      material: wood
      snap_points:
        - id: bottom
          local_pos: [0.0, -1.0, 0.0]
          direction: [0.0, -1.0, 0.0]
          group: wall-bottom
          accepts: [floor-edge]
        - id: top
          local_pos: [0.0, 1.0, 0.0]
          direction: [0.0, 1.0, 0.0]
          group: wall-top
          accepts: [wall-top, roof-edge]
        - id: left
          local_pos: [-1.0, 0.0, 0.0]
          direction: [-1.0, 0.0, 0.0]
          group: wall-side
          accepts: [wall-side]
        - id: right
          local_pos: [1.0, 0.0, 0.0]
          direction: [1.0, 0.0, 0.0]
          group: wall-side
          accepts: [wall-side]

    - id: wood-fence-2x1
      label: Wood Fence
      category: fence
      dimensions_m: [2.0, 1.0, 0.1]
      can_ground: true
      material: wood
      snap_points:
        - id: bottom
          local_pos: [0.0, -0.5, 0.0]
          direction: [0.0, -1.0, 0.0]
          group: wall-bottom
          accepts: [floor-edge]
        - id: left
          local_pos: [-1.0, 0.0, 0.0]
          direction: [-1.0, 0.0, 0.0]
          group: generic
          accepts: [generic]
        - id: right
          local_pos: [1.0, 0.0, 0.0]
          direction: [1.0, 0.0, 0.0]
          group: generic
          accepts: [generic]

    - id: wood-pillar-2m
      label: Wood Pillar
      category: pillar
      dimensions_m: [0.4, 2.0, 0.4]
      can_ground: true
      material: wood
      snap_points:
        - id: bottom
          local_pos: [0.0, -1.0, 0.0]
          direction: [0.0, -1.0, 0.0]
          group: floor-edge
          accepts: [floor-edge]
        - id: top
          local_pos: [0.0, 1.0, 0.0]
          direction: [0.0, 1.0, 0.0]
          group: wall-top
          accepts: [wall-top, roof-edge]
