- id: wood-floor
  name: Wood Floor
  category: floor
  dimensions: [4.0, 0.2, 4.0]
  canGround: true
  materialId: top-soil
  snapPoints:
    - id: north
      localOffset: [0.0, 0.0, -2.0]
      direction: [0.0, 0.0, -1.0]
      group: floor-edge
      compatibleGroups: [floor-edge]
    - id: south
      localOffset: [0.0, 0.0, 2.0]
      direction: [0.0, 0.0, 1.0]
      group: floor-edge
      compatibleGroups: [floor-edge]
    - id: east
      localOffset: [2.0, 0.0, 0.0]
      direction: [1.0, 0.0, 0.0]
      group: floor-edge
      compatibleGroups: [floor-edge]
    - id: west
      localOffset: [-2.0, 0.0, 0.0]
      direction: [-1.0, 0.0, 0.0]
      group: floor-edge
      compatibleGroups: [floor-edge]

- id: wood-wall
  name: Wood Wall
  category: wall
  dimensions: [4.0, 3.0, 0.2]
  canGround: false
  materialId: sub-soil
  snapPoints:
    - id: bottom
      localOffset: [0.0, -1.5, 0.0]
      direction: [0.0, -1.0, 0.0]
      group: wall-bottom
      compatibleGroups: [floor-edge]
    - id: top
      localOffset: [0.0, 1.5, 0.0]
      direction: [0.0, 1.0, 0.0]
      group: wall-top
      compatibleGroups: [wall-bottom]

- id: stone-floor
  name: Stone Floor
